<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ================= COOKIEYES ================= -->
    <script
      id="cookieyes"
      type="text/javascript"
      src="https://cdn-cookieyes.com/client_data/6847be920d56d80c544d8390bbd92fcf/script.js"
    ></script>

    <!-- ================= BASIC SEO ================= -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5"
    />

    <!-- ================= TITLE ================= -->
    <!--
      TITLE TAG: Sabse important on-page SEO factor.
      - Primary keyword pehle rakhein
      - Brand name last mein
      - 55-60 characters ideal length
    -->
    <title>
      Buy Handmade Handicrafts Online India | Authentic Indian Home Decor & Artisan Gifts | BiZhar Heritage
    </title>

    <!-- ================= PRIMARY META SEO ================= -->
    <!--
      DESCRIPTION: 150-160 characters. High-intent words + trust signals.
      Google yahi snippet dikhata hai search results mein.
    -->
    <meta
      name="description"
      content="Shop authentic handmade handicrafts, ethnic home decor & traditional Indian artisan gifts at BiZhar Heritage. Handcrafted wall art, pottery, textiles & festival gifts. Free shipping across India. 100% genuine artisan products."
    />

    <!--
      KEYWORDS: Google inhe rank factor nahi maanta lekin Bing/Yahoo use karte hain.
      Long-tail + transactional + local keywords mix rakho.
    -->
    <meta
      name="keywords"
      content="buy handmade handicrafts online India, authentic Indian handcrafted home decor, premium handicrafts online shopping India, traditional Indian artisan crafts shop, handmade rajasthani home decor online, handcrafted gifts for diwali India, buy Indian folk art decor online, sustainable handmade products India, unique handcrafted return gifts India, Indian heritage craft gifts for NRI, handmade wall art India buy online, artisan made pottery home decor India, ethnic home decor India online, luxury Indian handicrafts buy, handmade gift items India, BiZhar Heritage handicrafts, handcrafted home accessories India, handmade wedding gifts India, Indian traditional art online shop, handloom textiles India online"
    />

    <meta name="author" content="BiZhar Heritage" />

    <!--
      ROBOTS: max-image-preview:large = Google image search mein bada preview
      max-snippet:-1 = full description snippet allowed
      max-video-preview:-1 = video previews allowed
    -->
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="rating" content="general" />
    <meta name="category" content="Shopping, Handicrafts, Home Decor, Indian Art" />

    <!-- ================= CANONICAL ================= -->
    <!--
      CANONICAL: Duplicate content issues se bachata hai.
      Hamesha www version ko canonical rakho.
    -->
    <link rel="canonical" href="https://www.bizharheritage.com/" />

    <!-- ================= FAVICON ================= -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/BiZhar Heritage logo .png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/BiZhar Heritage logo .png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/BiZhar Heritage logo .png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/BiZhar Heritage logo .png" />

    <!-- ================= THEME ================= -->
    <meta name="theme-color" content="#7b3f00" />
    <meta name="msapplication-TileColor" content="#7b3f00" />

    <!-- ================= OPEN GRAPH (Facebook, WhatsApp, LinkedIn) ================= -->
    <!--
      OG TAGS: Social media par share hone par yeh dikhai deta hai.
      og:image minimum 1200x630px hona chahiye for best results.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BiZhar Heritage" />

    <meta
      property="og:title"
      content="BiZhar Heritage — Authentic Handmade Indian Handicrafts & Home Decor Online"
    />

    <meta
      property="og:description"
      content="Discover authentic handmade handicrafts & traditional Indian artisan gifts. Shop ethnic home decor, handcrafted wall art, pottery & festival gifts online. Free shipping across India."
    />

    <meta property="og:url" content="https://www.bizharheritage.com/" />

    <meta
      property="og:image"
      content="https://www.bizharheritage.com/og-image.jpg"
    />
    <meta property="og:image:secure_url" content="https://www.bizharheritage.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BiZhar Heritage — Authentic Handmade Indian Handicrafts" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:locale:alternate" content="hi_IN" />

    <!-- ================= TWITTER / X CARD ================= -->
    <!--
      TWITTER CARD: Twitter par share hone par yeh use hota hai.
      summary_large_image = bada image card dikhata hai.
    -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bizharheritage" />
    <meta name="twitter:creator" content="@bizharheritage" />

    <meta
      name="twitter:title"
      content="BiZhar Heritage — Buy Authentic Handmade Indian Handicrafts Online"
    />

    <meta
      name="twitter:description"
      content="Shop authentic handmade handicrafts, ethnic home decor & traditional Indian artisan gifts. Free shipping across India at BiZhar Heritage."
    />

    <meta
      name="twitter:image"
      content="https://www.bizharheritage.com/og-image.jpg"
    />
    <meta name="twitter:image:alt" content="BiZhar Heritage — Authentic Handmade Indian Handicrafts" />

    <!-- ================= GEO SEO ================= -->
    <!--
      GEO TAGS: Location-based searches mein help karta hai.
    -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="geo.position" content="20.5937;78.9629" />
    <meta name="ICBM" content="20.5937,78.9629" />

    <!-- ================= PWA ================= -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BiZhar Heritage" />
    <meta name="application-name" content="BiZhar Heritage" />

    <!-- ================= PERFORMANCE — DNS Prefetch + Preconnect ================= -->
    <!--
      PERFORMANCE: Browser pehle se hi connections establish kar leta hai,
      page load faster hoti hai — Core Web Vitals improve hote hain.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://cdn-cookieyes.com" />
    <link rel="dns-prefetch" href="https://www.bizharheritage.com" />

    <!-- ================= GOOGLE FONTS ================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ================= STRUCTURED DATA (JSON-LD) ================= -->
    <!--
      SCHEMA MARKUP: Google ko apni website ke baare mein structured info deta hai.
      Rich snippets mein help karta hai — star ratings, price, breadcrumbs etc.
    -->

    <!-- Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "BiZhar Heritage",
        "alternateName": "Bizhar Heritage Crafts",
        "url": "https://www.bizharheritage.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.bizharheritage.com/biharlogo.png",
          "width": 200,
          "height": 200
        },
        "description": "BiZhar Heritage offers premium handcrafted products from across India, supporting skilled artisans and preserving Indian heritage crafts.",
        "foundingDate": "2023",
        "areaServed": "India",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["English", "Hindi"]
        },
        "sameAs": [
          "https://www.instagram.com/bizharheritage",
          "https://www.facebook.com/bizharheritage"
        ]
      }
    </script>

    <!-- Store / LocalBusiness Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "BiZhar Heritage",
        "image": {
          "@type": "ImageObject",
          "url": "https://www.bizharheritage.com/og-image.jpg",
          "width": 1200,
          "height": 630
        },
        "url": "https://www.bizharheritage.com",
        "description": "Shop premium authentic handmade handicrafts, ethnic home decor & traditional Indian artisan gifts at BiZhar Heritage.",
        "priceRange": "₹₹",
        "areaServed": {
          "@type": "Country",
          "name": "India"
        },
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Handmade Indian Handicrafts",
          "itemListElement": [
            {
              "@type": "OfferCatalog",
              "name": "Home Decor"
            },
            {
              "@type": "OfferCatalog",
              "name": "Wall Art"
            },
            {
              "@type": "OfferCatalog",
              "name": "Handcrafted Gifts"
            },
            {
              "@type": "OfferCatalog",
              "name": "Textiles"
            },
            {
              "@type": "OfferCatalog",
              "name": "Pottery & Ceramics"
            }
          ]
        },
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        }
      }
    </script>

    <!-- WebSite Schema with SearchAction (Sitelinks Search Box) -->
    <!--
      SITELINKS SEARCH BOX: Google search results mein directly
      aapki website ka search box dikha sakta hai.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "BiZhar Heritage",
        "alternateName": "BiZhar Heritage Handicrafts",
        "url": "https://www.bizharheritage.com",
        "description": "India's trusted online store for authentic handmade handicrafts, traditional Indian home decor and artisan gifts.",
        "inLanguage": "en-IN",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://www.bizharheritage.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- BreadcrumbList Schema -->
    <!--
      BREADCRUMBS: Google SERP mein URL ke neeche breadcrumb path dikhata hai.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://www.bizharheritage.com/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Handicrafts",
            "item": "https://www.bizharheritage.com/handicrafts"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "Home Decor",
            "item": "https://www.bizharheritage.com/home-decor"
          }
        ]
      }
    </script>

    <!-- FAQPage Schema -->
    <!--
      FAQ SCHEMA: Google search mein "People Also Ask" section mein
      aapke questions dikha sakta hai — bahut zyada visibility milti hai.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Are BiZhar Heritage products 100% handmade?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, all products at BiZhar Heritage are 100% authentic handmade by skilled Indian artisans. We source directly from craftsmen across India to ensure genuine handcrafted quality."
            }
          },
          {
            "@type": "Question",
            "name": "Does BiZhar Heritage ship across India?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, BiZhar Heritage offers free shipping across India on all handmade handicraft orders. We deliver to all major cities and towns."
            }
          },
          {
            "@type": "Question",
            "name": "What types of Indian handicrafts are available at BiZhar Heritage?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "BiZhar Heritage offers a wide range of authentic Indian handicrafts including handmade home decor, wall art, pottery, handloom textiles, traditional Indian art, artisan jewelry, and handcrafted gifts for all occasions."
            }
          },
          {
            "@type": "Question",
            "name": "Can I buy handcrafted gifts for Diwali and other festivals at BiZhar Heritage?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Absolutely! BiZhar Heritage has a special collection of handcrafted festival gifts for Diwali, Holi, Raksha Bandhan, weddings and other occasions. Our artisan-made gift hampers are perfect for gifting."
            }
          }
        ]
      }
    </script>
